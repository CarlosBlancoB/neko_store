pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{ts,tsx,js,jsx,json,md}'
      run: npx @biomejs/biome check --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: '*.{ts,tsx}'
      run: npx tsc --noEmit
    test:
      glob: '*.{ts,tsx}'
      run: npx vitest run --reporter=verbose
