pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: npx @biomejs/biome check --write --staged --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
      stage_fixed: false

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npx tsc --noEmit
    test:
      run: npx vitest run --passWithNoTests

commit-msg:
  commands:
    lint-commit:
      run: |
        echo "$(cat {1})" | grep -qE '^(feat|fix|chore|docs|refactor|test|style|perf|ci|build|revert)(\(.+\))?!?: .{1,72}'
